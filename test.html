<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>JS Self-Profiling Markers Test</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; margin: 20px; background: #1a1a2e; color: #e0e0e0; }
    h1 { color: #e94560; margin-bottom: 6px; }

    #status { padding: 8px 14px; border-radius: 4px; margin: 10px 0; display: inline-block; font-size: 13px; }
    .pass   { background: #1a3a2a; border: 1px solid #28a745; color: #5ddb85; }
    .fail   { background: #3a1a1a; border: 1px solid #dc3545; color: #e96a6a; }
    .info   { background: #1a2a3a; border: 1px solid #17a2b8; color: #5bc0de; }

    .controls { margin: 12px 0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button {
      background: #e94560; color: #fff; border: none; padding: 8px 18px;
      cursor: pointer; border-radius: 4px; font-size: 13px; font-family: monospace;
    }
    button:hover { background: #c73652; }
    button:disabled { background: #444; color: #888; cursor: default; }

    /* ── Legend ── */
    #legend { display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0 4px; }
    .legend-item {
      display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer;
      padding: 3px 8px; border-radius: 3px; border: 1px solid transparent;
      user-select: none;
    }
    .legend-item:hover { border-color: #555; }
    .legend-item.hidden { opacity: 0.35; }
    .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

    /* ── Timeline ── */
    #timeline-wrap {
      position: relative;
      margin: 16px 0 0;
      background: #12121f;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      padding: 10px 12px 8px;
      display: none;
    }
    #timeline-wrap h2 { margin: 0 0 8px; font-size: 14px; color: #aaa; font-weight: normal; }
    canvas#timeline {
      display: block;
      width: 100%;
      cursor: crosshair;
    }
    #time-axis {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #0d0d1a;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      max-width: 460px;
      z-index: 9999;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.7);
      line-height: 1.6;
    }
    #tooltip .tt-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    #tooltip .tt-lane-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 12px;
      letter-spacing: 0.03em;
    }
    #tooltip .tt-section-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      border: 1px solid;
      font-weight: normal;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #tooltip .tt-meta {
      color: #666;
      font-size: 11px;
      margin-bottom: 4px;
    }
    #tooltip .tt-meta b { color: #999; font-weight: normal; }
    #tooltip .tt-reason {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 3px;
      margin-bottom: 5px;
      border-left: 2px solid;
    }
    #tooltip .tt-stack {
      margin-top: 6px;
      border-top: 1px solid #2a2a3a;
      padding-top: 6px;
      color: #aaa;
    }
    #tooltip .tt-frame {
      color: #7ec8e3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #tooltip .tt-frame-leaf { color: #e0e0e0; }
    #tooltip .tt-frame-ann {
      font-size: 10px;
      margin-left: 6px;
      opacity: 0.7;
      font-style: italic;
    }
    #tooltip .tt-nostack { color: #777; font-style: italic; }
    #tooltip .tt-src {
      margin-top: 6px;
      border-top: 1px solid #2a2a3a;
      padding-top: 6px;
    }
    #tooltip .tt-src pre {
      margin: 0;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.6;
      white-space: pre;
      overflow-x: auto;
      background: #0a0a16;
      border: 1px solid #2a2a3e;
      border-radius: 3px;
      padding: 5px 8px;
    }
    #tooltip .tt-src-line { color: #555577; }
    #tooltip .tt-src-line.tt-src-target { color: #e0e0e0; background: #1e1e3a; display: block; border-radius: 2px; }
    #tooltip .tt-src-caret { color: #e94560; user-select: none; }
    #tooltip .tt-src-loading { color: #555; font-style: italic; font-size: 11px; }
    #tooltip .tt-src-label { font-size: 10px; color: #555577; margin-bottom: 3px; }

    /* ── Stats bar ── */
    #stats {
      display: none;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 0;
      font-size: 12px;
    }
    .stat-box {
      background: #12121f;
      border: 1px solid #2a2a3e;
      border-radius: 4px;
      padding: 6px 12px;
    }
    .stat-box span { font-size: 18px; font-weight: bold; display: block; }

    /* ── Log ── */
    #log-wrap { margin-top: 16px; }
    #log-wrap summary { cursor: pointer; color: #888; font-size: 12px; margin-bottom: 4px; }
    #results {
      white-space: pre-wrap;
      background: #0d0d1a;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid #2a2a3e;
      font-size: 11px;
      color: #888;
      max-height: 300px;
      overflow-y: auto;
    }

    #target { display: none; }
    #dom-container { display: none; }
  </style>
</head>
<body>
  <h1>JS Self-Profiling — Marker Timeline</h1>
  <div id="status" class="info">Checking environment…</div>

  <div class="controls">
    <button id="btn-run" onclick="runTest()">▶ Run Profiling Test</button>
  </div>

  <div id="legend"></div>

  <div id="stats"></div>

  <div id="timeline-wrap">
    <h2>Sample timeline — hover a dot for stack trace</h2>
    <canvas id="timeline"></canvas>
    <div id="time-axis"></div>
  </div>

  <div id="tooltip"></div>

  <div id="log-wrap">
    <details>
      <summary>Raw log</summary>
      <div id="results"></div>
    </details>
  </div>

  <div id="target" style="width:100px;height:100px;background:red;"></div>
  <div id="dom-container"></div>

  <script>
    // ── Lane definitions ─────────────────────────────────────────────────────
    //
    // Two sections on the same canvas:
    //
    //  EXPLICIT  — lanes driven by sample.marker directly
    //  INFERRED  — lanes for no-marker samples:
    //   js   — no marker + has stack  (script marker suppressed outside COI)
    //   idle — no marker + no stack

    const MARKER_COLORS = {
      // explicit
      gc:     '#e94560',
      layout: '#0f9b58',
      style:  '#4285f4',
      paint:  '#f4b400',
      script: '#ab47bc',
      // inferred
      js:     '#ce93d8',  // lighter purple — same family as script, clearly inferred
      idle:   '#6b6b8a',
    };

    // Ordered display lists for each section
    const EXPLICIT_LANES = ['layout', 'style', 'gc', 'paint', 'script'];
    const INFERRED_LANES = ['js', 'idle'];
    const ALL_LANES = [...EXPLICIT_LANES, ...INFERRED_LANES];

    const hiddenMarkers = new Set();

    // Returns the inferred lane key for a no-marker sample.
    function inferredLane(sample) {
      return sample.stackId == null ? 'idle' : 'js';
    }

    // Returns the display lane for any sample.
    function effectiveLane(sample) {
      if (sample.marker) return sample.marker; // explicit lane
      return inferredLane(sample);             // inferred lane
    }



    // ── DOM refs ────────────────────────────────────────────────────────────
    const statusEl   = document.getElementById('status');
    const resultsEl  = document.getElementById('results');
    const legendEl   = document.getElementById('legend');
    const statsEl    = document.getElementById('stats');
    const wrapEl     = document.getElementById('timeline-wrap');
    const canvas     = document.getElementById('timeline');
    const axisEl     = document.getElementById('time-axis');
    const tooltipEl  = document.getElementById('tooltip');
    const btnRun     = document.getElementById('btn-run');

    const isCOI = self.crossOriginIsolated;
    statusEl.textContent = isCOI
      ? '✓ Cross-Origin Isolated — all markers expected'
      : '✗ Not Cross-Origin Isolated — only layout & style expected';
    statusEl.className = isCOI ? 'pass' : 'info';

    // ── Legend ──────────────────────────────────────────────────────────────
    function buildLegend(presentLanes) {
      legendEl.innerHTML = '';

      const sections = [
        { label: 'Explicit markers', lanes: EXPLICIT_LANES },
        { label: 'Inferred (no marker)', lanes: INFERRED_LANES },
      ];

      for (const { label, lanes } of sections) {
        const visibleLanes = lanes.filter(l => presentLanes.has(l));
        if (!visibleLanes.length) continue;

        const sep = document.createElement('span');
        sep.style.cssText = 'color:#555;font-size:11px;align-self:center;padding-right:4px;';
        sep.textContent = label + ':';
        legendEl.appendChild(sep);

        for (const m of visibleLanes) {
          const item = document.createElement('div');
          item.className = 'legend-item';
          item.dataset.marker = m;
          const INFERRED_LABELS = { js: 'js (exec)', idle: 'idle' };
          const label2 = INFERRED_LANES.includes(m) ? INFERRED_LABELS[m] : m;
          item.innerHTML = `<div class="legend-dot" style="background:${MARKER_COLORS[m]}"></div>${label2}`;
          item.addEventListener('click', () => {
            hiddenMarkers.has(m) ? hiddenMarkers.delete(m) : hiddenMarkers.add(m);
            item.classList.toggle('hidden');
            drawTimeline();
          });
          legendEl.appendChild(item);
        }

        // small gap between sections
        const spacer = document.createElement('span');
        spacer.style.cssText = 'display:inline-block;width:16px;';
        legendEl.appendChild(spacer);
      }
    }

    // ── Stats ────────────────────────────────────────────────────────────────
    function buildStats(samples, trace) {
      const counts = {};
      for (const s of samples) {
        const k = effectiveLane(s);
        counts[k] = (counts[k] || 0) + 1;
      }
      statsEl.style.display = 'flex';
      statsEl.innerHTML = '';
      const totalBox = document.createElement('div');
      totalBox.className = 'stat-box';
      totalBox.innerHTML = `<span>${samples.length}</span>total samples`;
      statsEl.appendChild(totalBox);

      for (const m of ALL_LANES) {
        if (!counts[m]) continue;
        const LABELS = { js: 'js (exec)', idle: 'idle' };
        const lbl = LABELS[m] || m;
        const box = document.createElement('div');
        box.className = 'stat-box';
        box.innerHTML = `<span style="color:${MARKER_COLORS[m]}">${counts[m]}</span>${lbl}`;
        statsEl.appendChild(box);
      }
    }

    // ── Timeline drawing ────────────────────────────────────────────────────
    let _samples  = [];
    let _trace    = null;
    let _hitBoxes = [];   // [{x, y, w, h, sample}]

    const ROW_H    = 22;
    const DOT_W    = 6;
    const DOT_H    = 14;
    const PAD_L    = 80;  // left gutter for labels
    const PAD_T    = 4;
    const PAD_B    = 8;
    // Extra vertical space consumed by the section divider
    const DIV_H    = 18;

    // Map a lane key to its canvas Y offset, accounting for the divider
    function laneY(key) {
      const eIdx = EXPLICIT_LANES.indexOf(key);
      if (eIdx !== -1) {
        return PAD_T + eIdx * ROW_H;
      }
      const iIdx = INFERRED_LANES.indexOf(key);
      // explicit section height + divider + inferred rows
      return PAD_T + EXPLICIT_LANES.length * ROW_H + DIV_H + iIdx * ROW_H;
    }

    function canvasHeight() {
      return PAD_T
        + EXPLICIT_LANES.length * ROW_H
        + DIV_H
        + INFERRED_LANES.length * ROW_H
        + PAD_B;
    }

    function drawTimeline() {
      if (!_samples.length) return;

      const dpr  = window.devicePixelRatio || 1;
      const cssW = canvas.parentElement.clientWidth - 24;
      const cssH = canvasHeight();
      canvas.style.width  = cssW + 'px';
      canvas.style.height = cssH + 'px';
      canvas.width  = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);

      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // background
      ctx.fillStyle = '#12121f';
      ctx.fillRect(0, 0, cssW, cssH);

      // ── Draw row bands + labels ──────────────────────────────────────────
      function drawSection(lanes, sectionLabel) {
        for (let r = 0; r < lanes.length; r++) {
          const key = lanes[r];
          const y   = laneY(key);

          // label gutter
          ctx.fillStyle = '#0d0d1a';
          ctx.fillRect(0, y, PAD_L, ROW_H);
          // sample area band
          ctx.fillStyle = r % 2 === 0 ? '#14142a' : '#12121f';
          ctx.fillRect(PAD_L, y, cssW - PAD_L, ROW_H);

          // row label — right-aligned in gutter
          const LABELS = { js: 'js (exec)', idle: 'idle' };
          const label = LABELS[key] || key;
          ctx.fillStyle = MARKER_COLORS[key];
          ctx.font = '11px monospace';
          const tw = ctx.measureText(label).width;
          ctx.fillText(label, PAD_L - tw - 8, y + ROW_H / 2 + 4);
        }
      }

      drawSection(EXPLICIT_LANES, 'explicit');
      drawSection(INFERRED_LANES, 'inferred');

      // ── Section divider ──────────────────────────────────────────────────
      const divY = PAD_T + EXPLICIT_LANES.length * ROW_H;

      // faint full-width rule
      ctx.strokeStyle = '#2a2a4a';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(PAD_L, divY + DIV_H / 2);
      ctx.lineTo(cssW, divY + DIV_H / 2);
      ctx.stroke();
      ctx.setLineDash([]);

      // divider label in gutter
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, divY, PAD_L, DIV_H);
      ctx.fillStyle = '#3a3a5a';
      ctx.font = '9px monospace';
      ctx.fillText('inferred ▼', 4, divY + DIV_H / 2 + 3);

      // divider label in sample area
      ctx.fillStyle = '#3a3a5a';
      ctx.font = '9px monospace';
      ctx.fillText('── no explicit marker ────────────────────', PAD_L + 6, divY + DIV_H / 2 + 3);

      // ── Vertical gutter separator ─────────────────────────────────────────
      ctx.strokeStyle = '#2a2a3e';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(PAD_L, 0);
      ctx.lineTo(PAD_L, cssH);
      ctx.stroke();

      // ── Samples ───────────────────────────────────────────────────────────
      const times   = _samples.map(s => s.timestamp);
      const tMin    = Math.min(...times);
      const tMax    = Math.max(...times);
      const tSpan   = tMax - tMin || 1;
      const usableW = cssW - PAD_L - 8;

      _hitBoxes = [];

      for (const sample of _samples) {
        const key = effectiveLane(sample);
        if (hiddenMarkers.has(key)) continue;
        if (!MARKER_COLORS[key]) continue;

        const x     = PAD_L + ((sample.timestamp - tMin) / tSpan) * usableW;
        const y     = laneY(key) + (ROW_H - DOT_H) / 2;
        const color = MARKER_COLORS[key];
        const isInferred = INFERRED_LANES.includes(key);
        ctx.globalAlpha = isInferred ? 0.65 : 0.85;

        if (isInferred) {
          ctx.strokeStyle = color;
          ctx.lineWidth   = 1.5;
          roundRect(ctx, x, y, DOT_W, DOT_H, 2);
          ctx.stroke();
        } else {
          ctx.fillStyle = color;
          roundRect(ctx, x, y, DOT_W, DOT_H, 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        _hitBoxes.push({ x, y, w: DOT_W, h: DOT_H, sample });
      }

      // time axis labels
      const steps = 6;
      axisEl.innerHTML = '';
      for (let i = 0; i <= steps; i++) {
        const t = tMin + (tSpan * i / steps);
        const span = document.createElement('span');
        span.textContent = t.toFixed(1) + 'ms';
        axisEl.appendChild(span);
      }
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    // ── Source fetcher ────────────────────────────────────────────────────
    // Cache: url → string[] (lines, 1-indexed via [line-1])
    const _srcCache = new Map();
    // In-flight promises so we don't double-fetch
    const _srcFetching = new Map();

    async function fetchSourceLines(url) {
      if (_srcCache.has(url)) return _srcCache.get(url);
      if (_srcFetching.has(url)) return _srcFetching.get(url);
      const p = (async () => {
        try {
          const res = await fetch(url, { credentials: 'same-origin' });
          if (!res.ok) return null;
          const text = await res.text();
          const lines = text.split('\n');
          _srcCache.set(url, lines);
          return lines;
        } catch {
          _srcCache.set(url, null); // mark as unfetchable
          return null;
        }
      })();
      _srcFetching.set(url, p);
      return p;
    }

    // Build a 5-line source snippet (±2 around targetLine) with column caret.
    // targetLine and targetCol are 1-based.
    function buildSourceSnippet(lines, targetLine, targetCol) {
      const CONTEXT = 2;
      const from = Math.max(1, targetLine - CONTEXT);
      const to   = Math.min(lines.length, targetLine + CONTEXT);

      let html = '';
      for (let ln = from; ln <= to; ln++) {
        const raw     = lines[ln - 1] ?? '';
        const escaped = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const gutter  = String(ln).padStart(4, ' ');
        const isTarget = ln === targetLine;
        html += `<span class="tt-src-line${isTarget ? ' tt-src-target' : ''}">`;
        html += `<span style="color:#3a3a5a;user-select:none">${gutter} │ </span>${escaped}`;
        html += `</span>\n`;
        if (isTarget && targetCol != null) {
          const gutterW = 7; // '1234 │ '.length
          const spaces  = ' '.repeat(gutterW + Math.max(0, targetCol - 1));
          html += `<span class="tt-src-caret">${spaces}^</span>\n`;
        }
      }
      return html;
    }

    // Patch the #tt-src placeholder inside the tooltip (if it's still visible
    // for the same sample) once source has loaded.
    let _tooltipSampleTs = null; // timestamp of the sample currently in the tooltip

    async function injectSourceSnippet(frame, sampleTs) {
      if (frame.resourceId == null || frame.line == null) return;
      const url = (_trace.resources || [])[frame.resourceId];
      if (!url) return;

      const lines = await fetchSourceLines(url);

      // Abort if the tooltip moved to a different sample while we were fetching
      if (_tooltipSampleTs !== sampleTs) return;
      const placeholder = document.getElementById('tt-src');
      if (!placeholder) return;

      if (!lines) {
        placeholder.innerHTML = `<span class="tt-src-loading">⚠ could not fetch source</span>`;
        return;
      }

      const shortUrl = url.length > 55 ? '…' + url.slice(-52) : url;
      const snippet  = buildSourceSnippet(lines, frame.line, frame.column);
      placeholder.innerHTML =
        `<div class="tt-src-label">${shortUrl}:${frame.line}:${frame.column ?? '?'}</div>` +
        `<pre>${snippet}</pre>`;
    }

    // ── Tooltip ─────────────────────────────────────────────────────────────
    function resolveStack(stackId, trace) {
      // Walk the stacks linked list to get frames in call order (root → leaf)
      if (stackId == null) return null;
      const frames = [];
      let sid = stackId;
      while (sid != null) {
        const stack = trace.stacks[sid];
        if (!stack) break;
        frames.unshift(stack.frameId);
        sid = stack.parentId != null ? stack.parentId : null;
      }
      return frames.map(fid => trace.frames[fid]).filter(Boolean);
    }

    function formatFrame(frame) {
      let name = frame.name || '(anonymous)';
      let loc  = '';
      if (frame.resourceId != null) {
        const res = (_trace.resources || [])[frame.resourceId];
        loc = res ? res : '?';
        // trim long urls
        if (loc.length > 60) loc = '…' + loc.slice(-57);
      }
      if (frame.line != null) loc += ':' + frame.line;
      if (frame.column != null) loc += ':' + frame.column;
      return { name, loc };
    }

    canvas.addEventListener('mousemove', e => {
      const rect  = canvas.getBoundingClientRect();
      const dpr   = window.devicePixelRatio || 1;
      const mx    = (e.clientX - rect.left);
      const my    = (e.clientY - rect.top);

      let hit = null;
      let bestDist = Infinity;

      for (const box of _hitBoxes) {
        // expand hit area by 4px
        const pad = 5;
        if (mx >= box.x - pad && mx <= box.x + box.w + pad &&
            my >= box.y - pad && my <= box.y + box.h + pad) {
          const cx = box.x + box.w / 2;
          const cy = box.y + box.h / 2;
          const d  = (mx - cx) ** 2 + (my - cy) ** 2;
          if (d < bestDist) { bestDist = d; hit = box; }
        }
      }

      if (!hit) { tooltipEl.style.display = 'none'; return; }

      const s          = hit.sample;
      const key        = effectiveLane(s);
      const color      = MARKER_COLORS[key];
      const frames     = resolveStack(s.stackId, _trace);
      const isInferred = INFERRED_LANES.includes(key);

      const LANE_LABELS = {
        js: 'js (exec)', idle: 'idle',
        layout: 'layout', style: 'style', gc: 'gc', paint: 'paint', script: 'script',
      };
      const INFERRED_REASONS = {
        js:      { icon: '⚙', text: 'JS execution — explicit <code>script</code> marker suppressed (no COI)' },
        idle: { icon: '○', text: 'Idle — no stack was captured for this sample' },
      };

      const laneLabel  = LANE_LABELS[key] || key;
      const pillColor  = key === 'paint' ? '#000' : '#fff';
      const badgeColor = isInferred ? '#4a4a6a' : '#1a3a2a';
      const badgeText  = isInferred ? 'inferred' : 'explicit';
      const badgeBorder= isInferred ? '#5a5a8a' : '#28a745';
      const badgeFg    = isInferred ? '#9999cc' : '#5ddb85';

      // ── header: pill + section badge
      let html = `<div class="tt-header">`;
      html += `<span class="tt-lane-pill" style="background:${color};color:${pillColor}">${laneLabel}</span>`;
      html += `<span class="tt-section-badge" style="background:${badgeColor};color:${badgeFg};border-color:${badgeBorder}">${badgeText}</span>`;
      html += `</div>`;

      // ── meta: timestamp · raw marker · stack presence
      const rawMarker = s.marker ? `<b>${s.marker}</b>` : `<span style="color:#555">(none)</span>`;
      const stackInfo = s.stackId != null
        ? `stackId <b>${s.stackId}</b>`
        : `<span style="color:#e94560">no stack</span>`;
      html += `<div class="tt-meta">t = <b>${s.timestamp.toFixed(3)} ms</b> &nbsp;·&nbsp; marker: ${rawMarker} &nbsp;·&nbsp; ${stackInfo}</div>`;

      // ── inferred reason box
      if (isInferred) {
        const r = INFERRED_REASONS[key];
        html += `<div class="tt-reason" style="background:#1a1a2e;border-color:${color};color:#aaa">`;
        html += `${r.icon} ${r.text}`;
        html += `</div>`;
      }

      // ── stack frames
      if (!frames || frames.length === 0) {
        const msg = key === 'idle'
          ? 'No stack — CPU was idle or sample occurred between tasks'
          : '⚠ stack expected but not found';
        html += `<div class="tt-stack"><span class="tt-nostack">${msg}</span></div>`;
      } else {
        html += `<div class="tt-stack">`;
        // frames array is root→leaf; reverse to show leaf first
        const reversed = [...frames].reverse();
        for (let i = 0; i < reversed.length; i++) {
          const { name, loc } = formatFrame(reversed[i]);
          const isLeaf = i === 0;
          const ann    = '';
          html += `<div class="tt-frame ${isLeaf ? 'tt-frame-leaf' : ''}" style="padding-left:${i * 10}px">`;
          html += `<span>${name}</span>`;
          if (loc) html += ` <span style="color:#555577;font-size:10px">${loc}</span>`;
          html += ann;
          html += `</div>`;
        }
        html += `</div>`;
      }

      // ── source snippet placeholder (leaf frame with a resource + line)
      const leafFrame = frames && frames.length ? frames[frames.length - 1] : null;
      const canShowSrc = leafFrame && leafFrame.resourceId != null && leafFrame.line != null;
      if (canShowSrc) {
        html += `<div class="tt-src" id="tt-src"><span class="tt-src-loading">loading source…</span></div>`;
      }

      _tooltipSampleTs = s.timestamp;
      tooltipEl.innerHTML = html;
      tooltipEl.style.display = 'block';

      if (canShowSrc) injectSourceSnippet(leafFrame, s.timestamp);

      // position — keep inside viewport
      const tw = 480, th = 260;
      let tx = e.clientX + 14;
      let ty = e.clientY + 14;
      if (tx + tw > window.innerWidth)  tx = e.clientX - tw - 14;
      if (ty + th > window.innerHeight) ty = e.clientY - th - 14;
      tooltipEl.style.left = tx + 'px';
      tooltipEl.style.top  = ty + 'px';
    });

    canvas.addEventListener('mouseleave', () => {
      tooltipEl.style.display = 'none';
      _tooltipSampleTs = null;
    });

    window.addEventListener('resize', () => { if (_samples.length) drawTimeline(); });

    // ── Log helper ───────────────────────────────────────────────────────────
    function log(msg) { resultsEl.textContent += msg + '\n'; }

    // ── Workloads (unchanged) ────────────────────────────────────────────────
    function forceLayout() {
      const container = document.getElementById('dom-container');
      container.style.display = 'block';
      const elements = [];
      for (let i = 0; i < 500; i++) {
        const div = document.createElement('div');
        div.style.cssText = 'position:relative;padding:1px;margin:1px;border:1px solid black;';
        div.textContent = 'layout test ' + i;
        container.appendChild(div);
        elements.push(div);
      }
      const start = performance.now();
      while (performance.now() - start < 300) {
        for (let i = 0; i < elements.length; i++) {
          elements[i].style.width  = ((i % 200) + 50) + 'px';
          elements[i].style.height = ((i % 50) + 10) + 'px';
          elements[i].style.padding = (i % 5) + 'px';
          void elements[i].getBoundingClientRect();
          void elements[i].offsetHeight;
          void elements[i].offsetWidth;
          void elements[i].offsetTop;
        }
      }
      container.innerHTML = '';
      container.style.display = 'none';
      return performance.now() - start;
    }

    function forceStyle() {
      const container = document.getElementById('dom-container');
      container.style.display = 'block';
      const elements = [];
      const styleEl = document.createElement('style');
      styleEl.textContent = `
        .style-a { color:red!important;font-size:14px;line-height:1.5;letter-spacing:0.5px; }
        .style-b { color:blue!important;font-size:16px;line-height:1.8;letter-spacing:1px; }
        .style-a > div { font-weight:bold; }
        .style-b > div { font-weight:normal; }
      `;
      document.head.appendChild(styleEl);
      for (let i = 0; i < 500; i++) {
        const div = document.createElement('div');
        div.className = 'style-a';
        const inner = document.createElement('div');
        inner.textContent = 'style test ' + i;
        div.appendChild(inner);
        container.appendChild(div);
        elements.push(div);
      }
      const start = performance.now();
      while (performance.now() - start < 300) {
        for (let i = 0; i < elements.length; i++) {
          elements[i].className = (i + Math.round(performance.now())) % 2 === 0 ? 'style-a' : 'style-b';
          void getComputedStyle(elements[i]).color;
          void getComputedStyle(elements[i]).fontSize;
          void getComputedStyle(elements[i]).lineHeight;
          void getComputedStyle(elements[i]).letterSpacing;
        }
      }
      container.innerHTML = '';
      container.style.display = 'none';
      styleEl.remove();
      return performance.now() - start;
    }

    function forceGC() {
      const start = performance.now();
      while (performance.now() - start < 300) {
        let arr = [];
        for (let i = 0; i < 50000; i++) arr.push({ data: new Array(100).fill(i) });
        arr = null;
      }
      return performance.now() - start;
    }

    function forceScript() {
      const start = performance.now();
      let sum = 0;
      while (performance.now() - start < 300) {
        for (let i = 0; i < 100000; i++) sum += Math.sqrt(i) * Math.sin(i);
      }
      return performance.now() - start;
    }

    function forcePaint() {
      // Force main-thread rasterization by mutating non-compositor properties
      // each frame. transform/opacity are GPU-composited and bypass paint.
      // box-shadow, border-radius, background-color and outline all require
      // the main thread to re-rasterize, producing paint markers.
      const container = document.getElementById('dom-container');
      container.style.display = 'block';
      for (let i = 0; i < 200; i++) {
        const div = document.createElement('div');
        div.style.cssText = `width:60px;height:20px;display:inline-block;margin:2px;`;
        container.appendChild(div);
      }
      return new Promise(resolve => {
        const start = performance.now();
        let frames = 0;
        function frame() {
          const children = container.children;
          for (let i = 0; i < children.length; i++) {
            const t = frames + i;
            // These all force main-thread paint (not compositor-only)
            children[i].style.backgroundColor = `hsl(${(t * 7) % 360},80%,50%)`;
            children[i].style.borderRadius = `${(t % 10)}px`;
            children[i].style.boxShadow = `0 0 ${(t % 8) + 2}px hsl(${(t * 13) % 360},70%,40%)`;
            children[i].style.outline = `${(t % 3) + 1}px solid hsl(${(t * 17) % 360},60%,50%)`;
          }
          frames++;
          if (performance.now() - start < 300) requestAnimationFrame(frame);
          else {
            container.innerHTML = '';
            container.style.display = 'none';
            resolve(performance.now() - start);
          }
        }
        requestAnimationFrame(frame);
      });
    }

    // ── Main test ────────────────────────────────────────────────────────────
    async function runTest() {
      resultsEl.textContent = '';
      btnRun.disabled = true;
      btnRun.textContent = '⏳ Running…';
      hiddenMarkers.clear();

      log('=== JS Self-Profiling Markers Test ===');
      log(`Cross-Origin-Isolated: ${isCOI}`);

      if (typeof Profiler === 'undefined') {
        log('ERROR: Profiler API not available.\nMake sure Chrome is launched with --enable-experimental-web-platform-features\nand served with Document-Policy: js-profiling');
        btnRun.disabled = false;
        btnRun.textContent = '▶ Run Profiling Test';
        return;
      }

      let profiler;
      try {
        profiler = new Profiler({ sampleInterval: 1, maxBufferSize: 100000 });
      } catch(e) {
        log(`ERROR creating profiler: ${e.message}`);
        btnRun.disabled = false;
        btnRun.textContent = '▶ Run Profiling Test';
        return;
      }

      log('Running workloads…');

      log('  → layout'); forceLayout();
      await new Promise(r => setTimeout(r, 50));
      log('  → style');  forceStyle();
      await new Promise(r => setTimeout(r, 50));
      log('  → paint');  await forcePaint();
      await new Promise(r => setTimeout(r, 50));
      log('  → gc');     forceGC();
      await new Promise(r => setTimeout(r, 50));
      log('  → script');  forceScript();
      await new Promise(r => setTimeout(r, 200));

      log('Stopping profiler…');
      const trace = await profiler.stop();
      log(`Collected ${trace.samples.length} samples`);

      // ── count & validate ────────────────────────────────────────────────
      const counts = {};
      for (const s of trace.samples) {
        const k = effectiveLane(s);
        counts[k] = (counts[k] || 0) + 1;
      }
      const allM = ['gc','layout','style','paint','script'];
      const expected   = isCOI ? allM : ['layout','style'];
      const unexpected = allM.filter(m => !expected.includes(m));
      let passed = true;
      for (const m of expected)   { if (!counts[m]) { log(`FAIL: missing ${m}`); passed = false; } }
      for (const m of unexpected) { if (counts[m])  { log(`FAIL: unexpected ${m}`); passed = false; } }
      log(passed ? '\n✓ PASS' : '\n✗ FAIL');
      statusEl.textContent = passed
        ? `✓ TEST PASSED — ${isCOI ? 'COI' : 'Non-COI'} context`
        : `✗ TEST FAILED — ${isCOI ? 'COI' : 'Non-COI'} context`;
      statusEl.className = passed ? 'pass' : 'fail';

      // ── render timeline ─────────────────────────────────────────────────
      _samples = trace.samples;
      _trace   = trace;

      const presentLanes = new Set(_samples.map(s => effectiveLane(s)));
      buildLegend(presentLanes);
      buildStats(_samples, trace);
      wrapEl.style.display = 'block';
      drawTimeline();

      btnRun.disabled = false;
      btnRun.textContent = '▶ Run Again';
    }
  </script>
</body>
</html>
